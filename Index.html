<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมคูณเลขยกมือ</title>
<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background: linear-gradient(to bottom,#87CEFA,#FFFACD);
    margin:0;
}
h1{
    color:#ff5722;
}
#question{
    font-size:42px;
    margin:20px;
    font-weight:bold;
}
.answers{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:20px;
}
.choice{
    width:150px;
    padding:30px;
    font-size:36px;
    background:white;
    border-radius:20px;
    box-shadow:0 4px 8px rgba(0,0,0,.3);
}
.left{
    border:5px solid blue;
}
.right{
    border:5px solid red;
}
#message{
    font-size:32px;
    margin:20px;
    color:green;
}
#score{
    font-size:28px;
}
video, canvas{
    width:320px;
    border-radius:20px;
    margin-top:10px;
}
</style>
</head>
<body>
<h1>🎮 เกมคูณเลขยกมือ ✋</h1>
<div id="score">คะแนน : 0</div>
<div id="question">2 × 3 = ?</div>
<div class="answers">
    <div class="choice left" id="leftAns">6</div>
    <div class="choice right" id="rightAns">8</div>
</div>
<div id="message">ยกมือซ้ายหรือขวาเพื่อตอบ</div>
<video id="video" autoplay playsinline></video>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
let correctAnswer;
let score = 0;
let canAnswer = true;
function newQuestion(){
    let a = Math.floor(Math.random()*11)+2;
    let b = Math.floor(Math.random()*11)+2;
    correctAnswer = a*b;
    let wrong;
    do{
        wrong = correctAnswer + Math.floor(Math.random()*10)-5;
    }while(wrong === correctAnswer || wrong <=0);
    document.getElementById("question").innerHTML =
        `${a} × ${b} = ?`;
    if(Math.random()>0.5){
        leftAns.innerHTML = correctAnswer;
        rightAns.innerHTML = wrong;
    }else{
        leftAns.innerHTML = wrong;
        rightAns.innerHTML = correctAnswer;
    }
    canAnswer = true;
}
function checkAnswer(side){
    if(!canAnswer) return;
    canAnswer = false;
    let selected =
        side === "left"
        ? Number(leftAns.innerHTML)
        : Number(rightAns.innerHTML);
    if(selected === correctAnswer){
        score++;
        scoreDiv.innerHTML = "คะแนน : " + score;
        message.innerHTML = "✅ ถูกต้อง";
    }else{
        message.innerHTML = "❌ ผิด";
    }
    setTimeout(()=>{
        message.innerHTML="ยกมือซ้ายหรือขวาเพื่อตอบ";
        newQuestion();
    },1500);
}
const videoElement = document.getElementById('video');
const message = document.getElementById('message');
const scoreDiv = document.getElementById('score');
const leftAns = document.getElementById('leftAns');
const rightAns = document.getElementById('rightAns');
const hands = new Hands({
    locateFile: (file) => {
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }
});
hands.setOptions({
    maxNumHands:1,
    modelComplexity:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});
hands.onResults(results => {
    if(results.multiHandedness.length > 0 && canAnswer){
        const handLabel =
            results.multiHandedness[0].label;
        if(handLabel === "Left"){
            checkAnswer("left");
        }else{
            checkAnswer("right");
        }
    }
});
const camera = new Camera(videoElement,{
    onFrame: async ()=>{
        await hands.send({image: videoElement});
    },
    width:320,
    height:240
});
camera.start();
newQuestion();
</script>
</body>
</html>
