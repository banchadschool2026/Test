<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมดนตรีแสนสนุก</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    padding:20px;
}

.game-box{
    max-width:600px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    color:#333;
}

button{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    font-size:20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.choice{
    background:#4CAF50;
    color:white;
}

.choice:hover{
    background:#45a049;
}

#score{
    font-size:24px;
    color:#e91e63;
}

#result{
    font-size:28px;
    color:blue;
}
</style>
</head>
<body>

<div class="game-box">
    <h1>🎵 เกมทายเครื่องดนตรี 🎵</h1>

    <div id="score">คะแนน: 0</div>
    <h2 id="question"></h2>

    <div id="choices"></div>

    <div id="result"></div>
</div>

<script>

const questions = [
{
    question:"เครื่องดนตรีชนิดใดมีสายและใช้ดีด?",
    answers:["กีตาร์","กลอง","ขลุ่ย","ฉาบ"],
    correct:"กีตาร์"
},
{
    question:"เครื่องดนตรีชนิดใดใช้เป่า?",
    answers:["เปียโน","แซกโซโฟน","กลอง","ระนาด"],
    correct:"แซกโซโฟน"
},
{
    question:"ระนาดเอกเป็นเครื่องดนตรีประเภทใด?",
    answers:["ตี","เป่า","สี","ดีด"],
    correct:"ตี"
},
{
    question:"ขิมเป็นเครื่องดนตรีประเภทใด?",
    answers:["ดีด","ตี","เป่า","สี"],
    correct:"ตี"
},
{
    question:"ไวโอลินเป็นเครื่องดนตรีประเภทใด?",
    answers:["สี","ตี","เป่า","ดีด"],
    correct:"สี"
}
];

let current = 0;
let score = 0;

function showQuestion(){

    if(current >= questions.length){
        document.getElementById("question").style.display="none";
        document.getElementById("choices").innerHTML="";
        document.getElementById("result").innerHTML=
        `🏆 จบเกม<br>คุณได้ ${score} คะแนน จาก ${questions.length} คะแนน`;
        return;
    }

    const q = questions[current];
    document.getElementById("question").innerText=q.question;

    let html="";
    q.answers.forEach(ans=>{
        html += `<button class="choice"
                 onclick="checkAnswer('${ans}')">${ans}</button>`;
    });

    document.getElementById("choices").innerHTML=html;
}

function checkAnswer(answer){

    if(answer===questions[current].correct){
        score++;
        alert("✅ ตอบถูก!");
    }else{
        alert("❌ ตอบผิด");
    }

    document.getElementById("score").innerText=
    "คะแนน: "+score;

    current++;
    showQuestion();
}

showQuestion();

</script>

</body>
</html>
