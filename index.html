<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เกมกำจัดยาเสพติด</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial,sans-serif;
    background:#222;
}

canvas, video{
    position:absolute;
    top:0;
    left:0;
}

#score{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-size:30px;
    z-index:10;
}

#msg{
    position:absolute;
    top:10px;
    right:10px;
    color:yellow;
    font-size:24px;
    z-index:10;
}
</style>
</head>
<body>

<div id="score">คะแนน: 0</div>
<div id="msg">🖐 ยกมือแตะยาเสพติด</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let handX = 0;
let handY = 0;
let score = 0;

const drugs = [];

function createDrug(){
    drugs.push({
        x: Math.random() * (canvas.width-50),
        y: -50,
        size: 50,
        speed: 2 + Math.random()*3
    });
}

setInterval(createDrug,1000);

navigator.mediaDevices.getUserMedia({
    video:{facingMode:"user"}
}).then(stream=>{
    video.srcObject = stream;
});

const hands = new Hands({
    locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
    maxNumHands:1,
    minDetectionConfidence:0.7,
    minTrackingConfidence:0.7
});

hands.onResults(results=>{
    if(results.multiHandLandmarks.length){
        let p = results.multiHandLandmarks[0][8]; // ปลายนิ้วชี้
        handX = canvas.width - p.x*canvas.width;
        handY = p.y*canvas.height;
    }
});

const camera = new Camera(video,{
    onFrame: async()=>{
        await hands.send({image:video});
    },
    width:640,
    height:480
});

camera.start();

function gameLoop(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // แสดงภาพจากกล้อง
    ctx.save();
    ctx.scale(-1,1);
    ctx.drawImage(video,-canvas.width,0,canvas.width,canvas.height);
    ctx.restore();

    // วาดมือ
    ctx.beginPath();
    ctx.arc(handX,handY,20,0,Math.PI*2);
    ctx.fillStyle="lime";
    ctx.fill();

    // ยาเสพติด
    for(let i=drugs.length-1;i>=0;i--){

        let d = drugs[i];
        d.y += d.speed;

        // วาดเป็นอิโมจิ
        ctx.font = "40px Arial";
        ctx.fillText("💊",d.x,d.y);

        // ชนกับมือ
        let dx = handX-d.x;
        let dy = handY-d.y;

        if(Math.sqrt(dx*dx+dy*dy)<40){
            drugs.splice(i,1);
            score++;
            document.getElementById("score").innerText =
            "คะแนน: "+score;
            continue;
        }

        // หลุดจอ
        if(d.y>canvas.height){
            drugs.splice(i,1);
        }
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();

</script>
</body>
</html>
